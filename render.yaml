# Render Blueprint for the Future Self Diary backend (temporary testing).
# In Render: Blueprint → Manual sync after pushing fixes.
#
# OPENAI_API_KEY is NOT stored here — set it in the Render dashboard (sync: false).
services:
  - type: web
    name: future-self-diary-api
    runtime: node
    rootDir: backend
    plan: free
    # Install devDependencies for the build, then compile Next.js.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: REFLECTION_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: REFLECTION_RATE_LIMIT_MAX
        value: "20"
      # Secret — paste your key in the Render dashboard when prompted.
      - key: OPENAI_API_KEY
        sync: false
